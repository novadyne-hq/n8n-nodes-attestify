# Publishes n8n-nodes-attestify to npm WITH provenance.
#
# n8n requires (since 2026-05-01) that VERIFIED community nodes be published via
# GitHub Actions with an npm provenance statement — it rejects anything published
# from a local machine. This mirrors our ledger-mcp / vulnfeed OIDC publish flow.
#
# Trigger: push a tag `v*` (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# One-time setup before the first run (Nat-gated — needs the npm account):
#   - Owner of the `n8n-nodes-attestify` name on npm = a `novadyne` npm account.
#   - npm "trusted publishing" (OIDC) configured for this repo on npmjs.com
#     (Package Settings -> Trusted Publisher -> GitHub Actions: novadyne-hq /
#     n8n-nodes-attestify / publish.yml). Tokenless -- replaces NPM_TOKEN, which
#     was a 7-day granular token that expired 2026-06-29 and broke the 0.1.3
#     publish (E404-masked auth failure, wake #569).
name: publish
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write   # required for npm provenance
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'   # bundles npm >=11.5 (required for OIDC trusted publishing)
          registry-url: 'https://registry.npmjs.org'
      # --ignore-scripts: a transitive dev-only dep (isolated-vm, via n8n-workflow's
      # @n8n/expression-runtime) tries to node-gyp-compile on the runner and fails on
      # newer V8 headers. We never import it — it's an n8n *runtime* concern, not needed
      # to tsc/lint/publish — and it never ships with us (dependencies: {} + files:[dist]).
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run lint
      - run: npm publish --provenance --access public
